<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Tables</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1, h2 {
            color: #333;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin-bottom: 20px;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        td {
            background-color: white;
        }

        .OCCUPIED {
            background-color: #ffcccc;
        }

        .AVAILABLE {
            background-color: #ccffcc;
        }

        .CLEANING {
            background-color: #ffffcc;
        }

        button {
            padding: 6px 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .section {
            flex: 1;
        }

        .top-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .nav-link {
            display: inline-block;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 6px;
            background-color: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
            font-weight: bold;
        }

        .nav-link.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .muted-note {
            color: #666;
            margin-bottom: 14px;
        }

        .inline-link-btn {
            display: inline-block;
            text-decoration: none;
            background: #2196F3;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 6px;
        }
    </style>
</head>

<body>

<h1>Table Status</h1>

<div class="top-nav">
    <a class="nav-link active" href="/">🪑 Tables</a>
    <a class="nav-link" href="/orders">📦 Orders</a>
    <a class="nav-link" href="/kitchen">🧑‍🍳 Kitchen</a>
    <a class="nav-link" href="/billing">📊 Billing</a>

</div>

<div class="muted-note">This view is linked with Orders. Freeing a table affects active orders, and new orders affect table status.</div>

<div class="container">

    <!-- TABLES -->
    <div class="section">
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Active Orders</th>
                    <th>Action</th>
                </tr>
            </thead>

            <!-- 🔥 THIS WILL BE FILLED BY JS -->
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- WAITLIST -->
    <div class="section">
        <h2>Waitlist</h2>

        <table border="1">
            <thead>
                <tr>
                    <th>Customer ID</th>
                    <th>Group Size</th>
                    <th>VIP</th>
                </tr>
            </thead>

            <!-- 🔥 FILLED BY JS -->
            <tbody id="waitlist-body"></tbody>
        </table>
    </div>

</div>

<h2>Allocate Table</h2>

<form action="/allocate" method="post">
    Customer ID: <input type="number" name="customerId" required><br><br>
    Group Size: <input type="number" name="groupSize" required><br><br>
    VIP: <input type="checkbox" name="isVIP"><br><br>
    <button type="submit">Allocate</button>
</form>

<!-- 🔥 REAL-TIME SCRIPT -->
<script>
function refreshData() {
    Promise.all([
        fetch('/tables-data').then(res => res.json()),
        fetch('/api/orders/active').then(res => res.json())
    ])
        .then(([data, activeOrders]) => {

            const orderCountByTable = {};
            activeOrders.forEach(order => {
                orderCountByTable[order.tableId] = (orderCountByTable[order.tableId] || 0) + 1;
            });

            // TABLES
            const tableBody = document.getElementById("table-body");
            tableBody.innerHTML = "";

            data.tables.forEach(t => {
                const canonicalTableId = `TABLE-${t.tableId}`;
                const activeOrderCount = orderCountByTable[canonicalTableId] || 0;
                let row = `
                    <tr>
                        <td>${t.tableId}</td>
                        <td>${t.capacity}</td>
                        <td class="${t.status}">
                            ${t.status}
                            ${t.status === 'CLEANING' ? '(Cleaning...)' : ''}
                        </td>
                        <td><strong>${activeOrderCount}</strong></td>
                        <td>
                            <form action="/free/${t.tableId}" method="post">
                                <button type="submit">Free</button>
                            </form>
                            <a class="inline-link-btn" href="/orders?tableId=${canonicalTableId}&customerId=${t.customerId || ''}">View Orders</a>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // WAITLIST
            const waitBody = document.getElementById("waitlist-body");
            waitBody.innerHTML = "";

            data.waitlist.forEach(c => {
                let row = `
                    <tr>
                        <td>${c.customerId}</td>
                        <td>${c.groupSize}</td>
                        <td>${c.vip}</td>
                    </tr>
                `;
                waitBody.innerHTML += row;
            });

        })
        .catch(err => console.error('Error refreshing table view:', err));
}

// 🔁 refresh every 2 sec
setInterval(refreshData, 2000);

// initial load
refreshData();
</script>

</body>
</html>
